<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wolf Staff Hub · Forgot password</title>
  <link rel="stylesheet" href="/public/staff-hub.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <img class="auth-logo" src="https://static.wixstatic.com/media/e9d01f_4fdd958481294a7d81012651d06a23c7~mv2.png" alt="Wolf Lighting">
    <p class="eyebrow">Account security</p>
    <h1>Reset password</h1>
    <p class="muted">Enter your Staff Hub email address. If an active account matches, we’ll send a secure reset link.</p>

    <form id="forgotPasswordForm">
      <label>
        Email address
        <input id="forgotEmail" type="email" autocomplete="email" required>
      </label>

      <p id="forgotMessage" class="form-message" aria-live="polite"></p>
      <button type="submit">Send reset link</button>
      <a class="auth-secondary-link" href="/login">Back to sign in</a>
    </form>
  </main>

  <script src="/public/forgot-password.js"></script>
  <script src="/public/nav-badges.js"></script>
</body>
</html>
