<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wolf Staff Hub · Sign in</title>
  <link rel="stylesheet" href="/public/staff-hub.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <img class="auth-logo" src="https://static.wixstatic.com/media/e9d01f_4fdd958481294a7d81012651d06a23c7~mv2.png" alt="Wolf Lighting">
    <p class="eyebrow">Staff Hub</p>
    <h1>Welcome back</h1>
    <p class="muted">Sign in with the account created by an administrator.</p>

    <form id="loginForm">
      <label>
        Email address
        <input id="email" type="email" autocomplete="username" required>
      </label>

      <label>
        Password
        <input id="password" type="password" autocomplete="current-password" required>
      </label>

      <div class="auth-form-link">
        <a href="/forgot-password">Forgot your password?</a>
      </div>

      <p id="message" class="form-message" aria-live="polite"></p>
      <button type="submit">Sign in</button>
    </form>
  </main>

  <script src="/public/login.js"></script>
  <script src="/public/nav-badges.js"></script>
</body>
</html>
