<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wolf Staff Hub · Choose password</title>
  <link rel="stylesheet" href="/public/staff-hub.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <img class="auth-logo" src="https://static.wixstatic.com/media/e9d01f_4fdd958481294a7d81012651d06a23c7~mv2.png" alt="Wolf Lighting">
    <p class="eyebrow">Account security</p>
    <h1>Choose a new password</h1>
    <p class="muted" id="resetIntro">Checking your secure reset link…</p>

    <form id="resetPasswordForm" hidden>
      <label>
        New password
        <input id="resetNewPassword" type="password" autocomplete="new-password" minlength="12" required>
        <small>Use at least 12 characters.</small>
      </label>

      <label>
        Confirm new password
        <input id="resetConfirmPassword" type="password" autocomplete="new-password" minlength="12" required>
      </label>

      <p id="resetMessage" class="form-message" aria-live="polite"></p>
      <button type="submit">Set new password</button>
    </form>

    <a class="auth-secondary-link" href="/login">Back to sign in</a>
  </main>

  <script src="/public/reset-password.js"></script>
  <script src="/public/nav-badges.js"></script>
</body>
</html>
